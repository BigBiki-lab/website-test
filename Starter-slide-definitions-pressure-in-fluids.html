<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pressure in fluids</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        * {
  margin: 0;
  padding: 0;
  font-family: "Roboto", sans-serif;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background-color: #34495e;
}

.cards {
  width: 100%;
  display: flex;
  flex-wrap: wrap;
  justify-content: space-around;
}

.card {
  margin: 40px;
  position: relative;
  width: 280px;
  height: 350px;
  box-shadow: 0 40px 60px -6px black;
}

.card-title {
  display: block;
  text-align: center;
  color: #fff;
  background-color: #6184a8;
  padding: 2%;
  border-top-right-radius: 4px;
  border-top-left-radius: 4px;
}

.card-question {
  font-size: 2rem;
  color: yellow;
  text-align: center;
  padding-top: 40px;
  padding-left: 10px;
  padding-right: 10px;
  }


.card img {
  width: 100%;
  height: 98%;
  object-fit: cover;
  display: block;
  position: relative;
}

.card-desc {
  width: 280px;
  display: block;
  font-size: 2.0rem;
  position: absolute;
  height: 0;
  top: 0;
  opacity: 0;
  padding-top: 30%;
  text-align: center;
  background-color: #E6BF83;
  overflow-y: scroll;
  transition: 0.8s ease;
}

p {
 color: #15317E;
 font-weight: bold;
 }

.card:hover .card-desc {
  opacity: 1;
  height: 265px;
}

h1 {
  font-size: 3.2rem;
  color: #EBA832;
  margin: 40px 0 20px 0;
  text-align: center;
}

    </style>
</head>
<body>
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<h1>Pressure in fluids</h1>
<div class="cards">
    <div class="card">
        <h2 class="card-title">1.</h2>
        <h3 class="card-question">The pressure exerted by the weight of the air around us.</h3>
        <p class="card-desc">Atmospheric pressure</p>
    </div>
    <div class="card">
        <h2 class="card-title">2.</h2>
        <h3 class="card-question">A measure of a substance's mass per unit volume.</h3>
        <p class="card-desc">Density</p>
    </div>
    <div class="card">
        <h2 class="card-title">3.</h2>
        <h3 class="card-question">The amount of force pushing on a certain area.</h3>
        <p class="card-desc">Pressure</p>
    </div>
    <div class="card">
        <h2 class="card-title">4.</h2>
        <h3 class="card-question">A gas or a liquid.</h3>
        <p class="card-desc">Fluid</p>
    </div>
</div>

</body>
</html>
