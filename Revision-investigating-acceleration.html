                    <div class="inner">
                        <p>What is acceleration?</p>
                    </div>
                </div>
                <div class="back">
                    <div class="inner" style=" color: #36013F;">
                        <p>rate of change in velocity</p>
                    </div>

        </div>
        <div class="col" ontouchstart="this.classList.toggle('hover');">
            <div class="container">
                <div class="front" style="#">

                        <p>What are the units for acceleration?</p>
                    </div>
                </div>
                <div class="back">
                    <div class="inner" style=" color: #36013F;">
                        <p>metres per second squared, m/s<sup>2</sup></p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col" ontouchstart="this.classList.toggle('hover');">
            <div class="container">
                <div class="front" style="#">
                    <div class="inner">
                        <p>Is acceleration vector or scalar quantity?</p>
                    </div>
                </div>
                <div class="back">
                    <div class="inner" style=" color: #36013F;">
                        <p>vector quantity</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col" ontouchstart="this.classList.toggle('hover');">
            <div class="container">
                <div class="front" style="#">
                    <div class="inner">
                        <p>Name a force that accelerates objects downwards.</p>
                    </div>
                </div>
                <div class="back">
                    <div class="inner" style=" color: #36013F;">
                        <p>gravity/weight</p>
                    </div>
                </div>
            </div>
        </div>

    </div>
