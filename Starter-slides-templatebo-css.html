<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Magnets and magnetic fields</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="starter-slide-style-2.css">

</head>
<body>

<div class="wrapper">
    <h1>Magnets and magnetic fields</h1>
    <div class="cols">
        <div class="col" ontouchstart="this.classList.toggle('hover');">
            <div class="container">
                <div class="front" style="#">
                    <div class="inner">
                        <p>Draw a magnetic field around a bar magnet.</p>

                    </div>
                </div>
                <div class="back">
                    <div class="inner">
                        <img src="images/magnetic-field-bar-magnet.png" style=" width: 200px;">
                    </div>
                </div>
            </div>
        </div>
        <div class="col" ontouchstart="this.classList.toggle('hover');">
            <div class="container">
                <div class="front" style="#">
                    <div class="inner">
                        <p>Where is a magnetic field the strongest?</p>

                    </div>
                </div>
                <div class="back">
                    <div class="inner" style=" color: #36013F;">
                        <p>The North Pole and the South Pole</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col" ontouchstart="this.classList.toggle('hover');">
            <div class="container">
                <div class="front" style="#">
                    <div class="inner">
                        <p>Which three metals are magnetic?</p>

                    </div>
                </div>
                <div class="back">
                    <div class="inner" style=" color: #36013F;">
                        <p>Iron, cobalt and nickel. (Steel-alloy)</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col" ontouchstart="this.classList.toggle('hover');">
            <div class="container">
                <div class="front" style="#">
                    <div class="inner">
                        <p>Draw sets of magnets that will attract and repel.</p>

                    </div>
                </div>
                <div class="back">
                    <div class="inner">
                        <img src="images/magnets-repel-attract.jpg" style=" width: 200px;">
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
