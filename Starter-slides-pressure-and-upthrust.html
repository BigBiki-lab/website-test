<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pressure and upthrust</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="starter-slide-style-2.css">

</head>
<body>

<div class="wrapper">
    <h1>Pressure and upthrust</h1>
    <div class="cols">
        <div class="col" ontouchstart="this.classList.toggle('hover');">
            <div class="container">
                <div class="front" style="#">
                    <div class="inner">
                        <p>What is pressure a measure of?</p>

                    </div>
                </div>
                <div class="back">
                    <div class="inner" style=" color: #36013F;">
                        <p>force on a unit of surface area</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col" ontouchstart="this.classList.toggle('hover');">
            <div class="container">
                <div class="front" style="#">
                    <div class="inner">
                        <p>What are the units for pressure?</p>

                    </div>
                </div>
                <div class="back">
                    <div class="inner" style=" color: #36013F;">
                        <p>pascals, Pa</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col" ontouchstart="this.classList.toggle('hover');">
            <div class="container">
                <div class="front" style="#">
                    <div class="inner">
                        <p>How is pressure calculated?</p>

                    </div>
                </div>
                <div class="back">
                    <div class="inner" style=" color: #36013F;">
                        <p>force divided by area</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col" ontouchstart="this.classList.toggle('hover');">
            <div class="container">
                <div class="front" style="#">
                    <div class="inner">
                        <p>What are the standard units for measuring force and area?</p>

                    </div>
                </div>
                <div class="back">
                    <div class="inner" style=" color: #36013F;">
                        <p>newtons and metres squared</p>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
